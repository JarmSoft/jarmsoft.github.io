<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>BoxYield</title>
  <meta name="viewport" content="width=device-width">
  <style>
    body { font-family: -apple-system, sans-serif; text-align: center; padding: 40px; color: #333; }
  </style>
</head>
<body>
  <p>Abriendo BoxYield…</p>
  <script>
    const qs = window.location.search.substring(1);
    const pkg = 'com.jarmsoft.boxyield';
    const ua = navigator.userAgent;
    if (/android/i.test(ua)) {
      const referrer = encodeURIComponent(qs);
      window.location.href =
        'https://play.google.com/store/apps/details?id=' + pkg +
        '&referrer=' + referrer;
    } else {
      window.location.href = 'https://play.google.com/store/apps/details?id=' + pkg;
    }
  </script>
</body>
</html>
